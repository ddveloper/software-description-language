<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Boutique - Microservices Demo — SDL Renderer</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f9fa; --surface: #fff; --border: #e2e8f0; --muted: #64748b;
  --accent: #3b82f6; --accent-dim: #dbeafe; --text: #1e293b;
  --green: #16a34a; --green-dim: #dcfce7;
  --amber: #d97706; --amber-dim: #fef3c7;
  --red: #dc2626; --red-dim: #fee2e2;
  --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,.08);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px; line-height: 1.5; color: var(--text); background: var(--bg); }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
code { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 12px;
  background: var(--border); padding: 1px 5px; border-radius: 3px; }

/* Layout */
#shell { display: flex; flex-direction: column; min-height: 100vh; }
#topbar { background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; align-items: center; gap: 24px; height: 52px;
  position: sticky; top: 0; z-index: 10; }
#topbar h1 { font-size: 15px; font-weight: 600; }
#layer-tabs { display: flex; gap: 0; }
.tab { padding: 0 16px; height: 52px; display: flex; align-items: center;
  cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted);
  font-size: 13px; font-weight: 500; transition: color .15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
#breadcrumb { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.crumb { cursor: pointer; color: var(--accent); }
.crumb:hover { text-decoration: underline; }
#main { flex: 1; padding: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; }
.card-header { padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; }
.card-title { font-weight: 600; font-size: 14px; }
.card-body { padding: 16px 18px; }
.card-body p { color: var(--muted); margin-bottom: 8px; }
.badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 99px;
  font-weight: 500; }
.badge-blue  { background: var(--accent-dim); color: #1d4ed8; }
.badge-green { background: var(--green-dim); color: #15803d; }
.badge-amber { background: var(--amber-dim); color: #92400e; }
.badge-gray  { background: #f1f5f9; color: #475569; }

/* Grid */
.grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

/* Mermaid container */
.mermaid-wrap { border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; background: var(--surface); margin-bottom: 20px; overflow-x: auto; }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; font-weight: 600; border-bottom: 2px solid var(--border);
  color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }

/* Service row */
.svc-row { display: flex; align-items: center; gap: 8px; padding: 12px 16px;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.svc-row:hover { background: var(--bg); }
.svc-row:last-child { border-bottom: none; }
.svc-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center;
  justify-content: center; font-size: 13px; flex-shrink: 0; }
.svc-icon.backend  { background: #e0e7ff; }
.svc-icon.frontend { background: var(--accent-dim); }
.svc-icon.external { background: var(--amber-dim); }
.svc-icon.worker   { background: var(--green-dim); }
.svc-name { font-weight: 500; flex: 1; }
.svc-domain { color: var(--muted); font-size: 12px; }

/* Steps */
.step { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.step:last-child { border-bottom: none; }
.step-id { font-weight: 700; min-width: 28px; color: var(--accent); font-size: 12px; }
.step-arrow { color: var(--muted); font-size: 11px; white-space: nowrap; }
.step-label { flex: 1; }
.step-meta { font-size: 11px; color: var(--muted); }

/* Perspective toggle */
.persp-tabs { display: flex; gap: 0; border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden; margin-bottom: 16px; width: fit-content; }
.persp-tab { padding: 6px 14px; cursor: pointer; font-size: 12px; font-weight: 500;
  color: var(--muted); background: var(--surface); transition: all .15s; }
.persp-tab.active { background: var(--accent); color: #fff; }

/* Rules list */
.rules-list { list-style: none; }
.rules-list li { padding: 5px 0; padding-left: 16px; position: relative; color: var(--text); }
.rules-list li::before { content: '–'; position: absolute; left: 0; color: var(--muted); }

/* Collapse accordion */
details summary { cursor: pointer; list-style: none; padding: 12px 18px;
  display: flex; align-items: center; gap: 8px; }
details summary::before { content: '▶'; font-size: 10px; color: var(--muted);
  transition: transform .15s; }
details[open] summary::before { transform: rotate(90deg); }
details summary::-webkit-details-marker { display: none; }

/* Overview */
#ov-toolbar { display: flex; align-items: center; gap: 6px; padding: 10px 0 12px; flex-wrap: wrap; }
.tog-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px;
  border: 1px solid var(--border); border-radius: 5px; cursor: pointer;
  font-size: 12px; font-weight: 500; background: var(--surface); color: var(--muted);
  user-select: none; }
.tog-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.tog-btn kbd { background: rgba(0,0,0,.08); border-radius: 3px; padding: 1px 4px;
  font-size: 10px; font-family: inherit; }
.tog-btn.on kbd { background: rgba(255,255,255,.25); }
#ov-body { display: flex; height: calc(100vh - 148px); }
#ov-flows-panel { width: 190px; border: 1px solid var(--border); border-radius: 8px 0 0 8px;
  overflow-y: auto; background: var(--surface); flex-shrink: 0; }
#ov-wrap { flex: 1; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  overflow: hidden; background: #fafbff; cursor: grab; position: relative; transition: opacity .35s; }
#ov-wrap.panning { cursor: grabbing !important; }
#ov-svg { display: block; width: 100%; height: 100%; }
#ov-steps-panel { width: 250px; border: 1px solid var(--border); border-left: none;
  border-radius: 0 8px 8px 0; background: var(--surface); display: flex;
  flex-direction: column; flex-shrink: 0; overflow: hidden; }
#ov-step-list { flex: 1; overflow-y: auto; }
#ov-playback-ctrl { padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
.ov-node { cursor: grab; }
.ov-node.dragging { cursor: grabbing; }
.ov-box { transition: filter .1s; }
.ov-node:hover .ov-box { filter: brightness(.96); }
.ov-flow-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border);
  font-size: 12px; transition: background .1s; }
.ov-flow-item:hover { background: var(--bg); }
.ov-flow-item.active { background: var(--accent-dim); border-left: 3px solid var(--accent); padding-left: 9px; }
.ov-step-item { padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: 11px; }
.ov-step-item.playing { background: var(--accent-dim); }
.ov-node-active .ov-box { filter: drop-shadow(0 0 4px rgba(59,130,246,.7)) brightness(.95); }
#main.ov-full { max-width: none; padding: 24px 12px; }
#ov-tip { position: fixed; pointer-events: none; z-index: 100; background: #1e293b; color: #f8fafc;
  font-size: 11px; padding: 6px 10px; border-radius: 6px; max-width: 220px; line-height: 1.5;
  box-shadow: 0 2px 8px rgba(0,0,0,.25); }
.ov-edge-hit { pointer-events: stroke; }
.ov-macro-node { cursor: pointer; }
.ov-micro-ep  { fill: #e0e7ff; }
.ov-micro-op  { fill: #dcfce7; }
.ov-micro-dep { fill: #fef3c7; }
</style>
</head>

  <main id="main"></main>
</div>

 checkout: frontend collects payment/shipping details, CheckoutService orchestrates cart retrieval, price resolution, currency conversion, shipping, payment, cart clearing, and email confirmation.","trigger":{"actor":"customer","description":"Customer submits checkout form. Frontend calls CheckoutService/PlaceOrder.","entry_point_ref":{"service_id":"frontend","entry_point_id":"place-order-route"}},"business":{"summary":"Customer submits checkout. Frontend validates and calls CheckoutService. CheckoutService retrieves cart, fetches products, converts prices, gets shipping quote, charges card, ships order, empties cart, and sends confirmation email.","actors":["Customer","Frontend","Checkout Service","Cart Service","Product Catalog Service","Currency Service","Shipping Service","Payment Service","Email Service"],"outcome":"Order placed, payment charged, shipped with tracking ID, cart emptied, confirmation email sent.","failure_modes":[{"condition":"Form validation fails","response":"422 error at frontend"},{"condition":"Cart empty or unavailable","response":"gRPC Internal error"},{"condition":"Card validation fails","response":"Payment error propagated as gRPC Internal"},{"condition":"Email fails","response":"Warning logged, order still succeeds"}]},"steps":[{"id":"1","from_service":"frontend","to_service":"checkout-service","label":"Submit checkout form","protocol":"grpc","style":"sync"},{"id":"2","from_service":"checkout-service","to_service":"cart-service","label":"Get user cart","protocol":"grpc","style":"sync"},{"id":"3","from_service":"checkout-service","to_service":"product-catalog-service","label":"Get product details per item","protocol":"grpc","style":"sync"},{"id":"4","from_service":"checkout-service","to_service":"currency-service","label":"Convert prices to user currency","protocol":"grpc","style":"sync"},{"id":"5","from_service":"checkout-service","to_service":"shipping-service","label":"Get shipping quote","protocol":"grpc","style":"sync"},{"id":"6","fr en REDIS_ADDR is set.","interface":{"protocol":"redis","calls":[{"label":"Get/Set/Delete cart data","style":"sync","purpose":"CRUD operations on cart data keyed by user_id."}]},"tags":["default-backend"]},{"id":"cart-store-spanner","kind":"database","label":"Cart Store (Cloud Spanner)","description":"Google Cloud Spanner backend when SPANNER_CONNECTION_STRING is set.","interface":{"protocol":"database","calls":[{"label":"Query/Upsert/Delete cart items","style":"sync","purpose":"Cart CRUD via Spanner."}]},"tags":["alternative-backend"]}],"dir":"/home/user/software-description-language/evaluation/microservices-demo/cartservice","serviceId":"cart-service"},{"manifest":{"dlVersion":"0.1","id":"checkout-service","label":"Checkout Service","description":"Orchestrates the end-to-end checkout flow for the online boutique. Receives a PlaceOrder request, retrieves the user's cart, resolves product prices, converts currencies, obtains a shipping quote, charges the credit card, ships the order, empties the cart, and sends an order confirmation email.","domain":"checkout","responsibilities":["Orchestrate the multi-step checkout flow across six downstream services","Retrieve user cart items and resolve product prices from the catalog","Convert product prices and shipping costs to the user's requested currency","Obtain shipping quotes and initiate order shipment","Charge the customer's credit card for the total order amount","Empty the user's cart after successful payment and shipment","Send order confirmation emails (best-effort, failures are logged but do not abort the order)","Generate unique order IDs using UUIDs"],"technology":{"language":"Go 1.25","framework":"gRPC (google.golang.org/grpc)","runtime":"Go binary","platform":"Google Cloud (with optional Cloud Profiler and OpenTelemetry tracing)"},"exposes":["grpc:CheckoutService/PlaceOrder"],"consumes":["grpc:CartService/GetCart","grpc:CartService/EmptyCart","grpc:ProductCatalogService/GetProduct","grpc:CurrencyService/Convert rt)"],"failure_modes":[{"condition":"UUID generation fails","response":"gRPC Internal: 'failed to generate order uuid'"},{"condition":"CartService/GetCart fails","response":"gRPC Internal: 'cart failure: ...'"},{"condition":"ProductCatalogService/GetProduct fails","response":"gRPC Internal: 'failed to get product #<id>'"},{"condition":"CurrencyService/Convert fails","response":"gRPC Internal: 'failed to convert price'"},{"condition":"ShippingService/GetQuote fails","response":"gRPC Internal: 'shipping quote failure'"},{"condition":"PaymentService/Charge fails","response":"gRPC Internal: 'failed to charge card'"},{"condition":"ShippingService/ShipOrder fails","response":"gRPC Unavailable: 'shipping error'"},{"condition":"CartService/EmptyCart fails","response":"Silently ignored; order succeeds"},{"condition":"EmailService/SendOrderConfirmation fails","response":"Warning logged; order succeeds"}],"domain_events_emitted":[]},"routing":{"handler":"PlaceOrder","file_ref":"main.go","steps":[{"id":"1.0","action":"generate UUID v1 for order ID","calls":"uuid.NewUUID()","returns":"order ID string"},{"id":"2.0","action":"retrieve user cart from CartService","calls":"CartService/GetCart","dependency_ref":"cart-service","returns":"Cart with items"},{"id":"3.0","action":"for each cart item: fetch product details from ProductCatalogService","calls":"ProductCatalogService/GetProduct","dependency_ref":"product-catalog-service","returns":"Product with USD price"},{"id":"4.0","action":"convert each product price to user's currency via CurrencyService","calls":"CurrencyService/Convert","dependency_ref":"currency-service","returns":"Money in user's currency"},{"id":"5.0","action":"get shipping quote from ShippingService","calls":"ShippingService/GetQuote","dependency_ref":"shipping-service","returns":"GetQuoteResponse with USD cost"},{"id":"5.1","action":"convert shipping cost to user's currency","calls":"CurrencyService/Convert","dependency_ref":"currency-service","returns":"Money in ity":{"fallback":"Failure logged but order succeeds"},"tags":["non-critical-path"]}],"dir":"/home/user/software-description-language/evaluation/microservices-demo/checkoutservice","serviceId":"checkout-service"},{"manifest":{"dlVersion":"0.1","id":"currency-service","label":"Currency Service","description":"A gRPC microservice that provides currency conversion capabilities using static exchange rates sourced from the European Central Bank. Supports listing available currencies and converting monetary amounts between 33 currencies via EUR as an intermediary.","domain":"finance","responsibilities":["List all supported currency codes from in-memory exchange rate data","Convert monetary amounts between any two supported currencies using EUR as the intermediary","Handle decimal precision using units (whole) and nanos (10^-9 fractional) representation"],"technology":{"language":"Node.js","framework":"gRPC (@grpc/grpc-js + @grpc/proto-loader)","runtime":"Node.js"},"exposes":["grpc:CurrencyService/GetSupportedCurrencies","grpc:CurrencyService/Convert"],"consumes":[],"tags":["currency","conversion","grpc","finance","exchange-rates"],"stats":{"entry_points":2,"operations":2,"data_shapes":4,"dependencies":0}},"entryPoints":[{"id":"get-supported-currencies","kind":"grpc-method","label":"Get Supported Currencies","operation_ref":"get-supported-currencies","grpc":{"service":"CurrencyService","method":"GetSupportedCurrencies","proto_ref":"protos/demo.proto"}},{"id":"convert","kind":"grpc-method","label":"Convert Currency","operation_ref":"convert-currency","grpc":{"service":"CurrencyService","method":"Convert","proto_ref":"protos/demo.proto"}}],"operations":[{"id":"get-supported-currencies","label":"Get Supported Currencies","business":{"summary":"Returns the list of all currency codes for which exchange rates are available. Reads the keys from the in-memory currency_conversion.json data file, which contains 33 currencies with EUR-based exchange rates sourced from the European Central Bank.","rules":["Currency codes are derived from the keys of the currency_conversion.json data file","The data includes 33 currencies: EUR, USD, JPY, BGN, CZK, DKK, GBP, HUF, PLN, RON, SEK, CHF, ISK, NOK, HRK, RUB, TRY, AUD, BRL, CAD, CNY, HKD, IDR, ILS, INR, KRW, MXN, MYR, NZD, PHP, SGD, THB, ZAR","Exchange rate data is loaded from a static JSON file on each request via require()"],"preconditions":[],"outcomes":["Returns a GetSupportedCurrenciesResponse containing an array of all supported ISO 4217 currency code strings"],"failure_modes":[],"domain_events_emitted":[]}},{"id":"convert-currency","label":"Convert Currency","business":{"summary":"Converts a monetary amount from one currency to another using a two-step conversion through EUR as the intermediary. First divides by the source currency's EUR exchange rate to get EUR, then multiplies by the target currency's EUR exchange rate.","rules":["Conversion uses EUR as the intermediary: from_currency is divided by its EUR rate to get EUR, then EUR is multiplied by the target currency's EUR rate","Monetary amounts are represented with units (whole number) and nanos (10^-9 fractional part) for precision","The _carry function normalizes units and nanos: nanos overflow beyond 10^9 is carried into units, and fractional units are carried into nanos","After converting to EUR, nanos are rounded using Math.round() to avoid floating-point drift","Final result units and nanos are both floored using Math.floor() before returning","The result Money message includes the target currency_code set from the request's to_code field"],"preconditions":["The from.currency_code must be a key present in currency_conversion.json","The to_code must be a key present in currency_conversion.json"],"outcomes":["Returns a Money message with currency_code set to to_code, and units/nanos representing the converted amount"],"failure_modes":[{"condition":"An exception occurs during conversion (e.g., unsupported currency code leading to division by undefined)","response":"Error is caught in try/catch, logged via pino logger, and returned to the gRPC caller as an error callback with the error message"}],"domain_events_emitted":[]}}],"dataShapes":[{"id":"money","label":"Money","kind":"value-object","fields":[{"name":"currency_code","type":"string","description":"The 3-letter ISO 4217 currency code (e.g., USD, EUR, JPY)"},{"name":"units","type":"int64","description":"The whole units of the monetary amount (e.g., for USD, 1 unit = 1 dollar)"},{"name":"nanos","type":"int32","description":"Number of nano (10^-9) units of the amount, ranging from -999999999 to +999999999"}]},{"id":"get-supported-currencies-response","label":"GetSupportedCurrenciesResponse","kind":"response","fields":[{"name":"currency_codes","type":"repeated string","description":"List of supported ISO 4217 currency code strings"}]},{"id":"currency-conversion-request","label":"CurrencyConversionRequest","kind":"request","fields":[{"name":"from","type":"Money","description":"The monetary amount and source currency to convert from"},{"name":"to_code","type":"string","description":"The 3-letter ISO 4217 currency code to convert to"}]},{"id":"currency-conversion-data","label":"Currency Conversion Data","kind":"internal","fields":[{"name":"{currency_code}","type":"string (numeric)","description":"EUR-based exchange rate for each currency. Keys are ISO 4217 currency codes, values are string representations of the exchange rate relative to EUR (EUR=1.0). Loaded from data/currency_conversion.json containing 33 currencies sourced from the European Central Bank."}]}],"dependencies":[],"dir":"/home/user/software-description-language/evaluation/microservices-demo/currencyservice","serviceId":"currency-service"},{"manifest":{"dlVersion":"0.1","id":"email-service","label":"Email Service","description":"Sends order confirmation emails to customers after checkout. Receives order details via gRPC, renders an HTML confirmation email from a Jinja2 template, and deliv
