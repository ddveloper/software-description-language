name: Validate SDL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: SDL Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        run: npm ci
        working-directory: cli

      - name: Build CLI
        run: npm run build
        working-directory: cli

      - name: Validate examples
        run: node cli/dist/index.js validate examples

      - name: Render HTML (smoke test)
        run: node cli/dist/index.js render examples --out /tmp/sdl-renderer.html
